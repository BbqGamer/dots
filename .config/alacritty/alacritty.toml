[general]
import = ["~/.config/alacritty/themes/kanagawa.toml"]

[env]
TERM = "xterm-256color"

[font]
size = 14

[font.bold]
family = "Iosevka"
style = "Bold"

[font.bold_italic]
family = "Iosevka"
style = "Bold Italic"

[font.italic]
family = "Iosevka"
style = "Light"

[font.normal]
family = "Iosevka"
style = "Regular"

[selection]
save_to_clipboard = false

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b[13;2u"
