# Hide unused HDMI outputs, rename the main outputs, and set priorities.
#
# This is a WirePlumber ALSA rule file.
# It affects the nodes created by the ALSA monitor.

monitor.alsa.rules = [
  # Hide the dock output that does not work, and keep HDMI/DP 2 visible.
  {
    matches = [
      { node.name = "alsa_output.usb-Lenovo_ThinkPad_USB-C_Dock_Audio_000000000000-00.analog-stereo" }
      { node.name = "alsa_output.pci-0000_04_00.1.HiFi__HDMI2__sink" }
      { node.name = "alsa_output.pci-0000_04_00.1.HiFi__HDMI3__sink" }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }

  # Rename HDMI/DP 2 to make it easier to choose and prioritize it.
  {
    matches = [
      { node.name = "alsa_output.pci-0000_04_00.1.HiFi__HDMI1__sink" }
    ]
    actions = {
      update-props = {
        node.description = "Monitor Audio"
        node.nick = "HDMI / DP 2"
        priority.session = 2000
        priority.driver = 2000
      }
    }
  }

  # Rename the internal speakers and give them a lower priority.
  {
    matches = [
      { node.name = "alsa_output.pci-0000_04_00.6.HiFi__Speaker__sink" }
    ]
    actions = {
      update-props = {
        node.description = "Laptop Speakers"
        node.nick = "Internal Audio"
        priority.session = 1200
        priority.driver = 1200
      }
    }
  }

  {
    matches = [
      { node.name = "alsa_output.usb-GN_Audio_A_S_Jabra_Evolve2_40_A0029C9803590E-00.analog-stereo" }
    ]
    actions = {
      update-props = {
        node.description = "Jabra Evolve2 40 Headphones"
        node.nick = "Jabra Evolve2 40"
        priority.session = 2500
        priority.driver = 2500
      }
    }
  }

  {
    matches = [
      { node.name = "alsa_input.usb-GN_Audio_A_S_Jabra_Evolve2_40_A0029C9803590E-00.mono-fallback" }
    ]
    actions = {
      update-props = {
        node.description = "Jabra Evolve2 40 Microphone"
        node.nick = "Jabra Evolve2 40 Mic"
        priority.session = 2500
        priority.driver = 2500
      }
    }
  }

  # Hide the bad/internal mic; keep the laptop mic, webcam, and Jabra mic.
  {
    matches = [
      { node.name = "alsa_input.pci-0000_04_00.6.HiFi__Mic2__source" }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }

  # Rename the working internal mic.
  {
    matches = [
      { node.name = "alsa_input.pci-0000_04_00.6.HiFi__Mic1__source" }
    ]
    actions = {
      update-props = {
        node.description = "Laptop Microphone"
        node.nick = "Laptop Mic"
        priority.session = 2200
        priority.driver = 2200
      }
    }
  }
]

# Prefer the current Bluetooth headphones over other outputs.
# This only affects the sink, not the microphone.
# The mic is disabled so apps do not trigger the low-quality headset profile.
monitor.bluez.rules = [
  {
    matches = [
      {
        node.name = "~bluez_output\\.00_0A_45_19_60_8D\\..*"
      }
    ]
    actions = {
      update-props = {
        priority.session = 3000
        priority.driver = 3000
      }
    }
  }
  {
    matches = [
      {
        node.name = "~bluez_input\\.00_0A_45_19_60_8D\\..*"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
]
